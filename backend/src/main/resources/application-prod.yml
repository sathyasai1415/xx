spring:
  jpa:
    show-sql: false
  datasource:
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5

server:
  forward-headers-strategy: framework

logging:
  level:
    root: WARN
    com.mislice: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
