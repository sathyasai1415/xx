services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mislice
      POSTGRES_USER: mislice
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mislice}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mislice"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/mislice
      DB_USERNAME: mislice
      DB_PASSWORD: ${DB_PASSWORD:-mislice}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"

volumes:
  pgdata:
